name: Windows EXE Derle (OpenGL 3D)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows .exe Derle - OpenGL 3D
    runs-on: windows-latest

    steps:
      - name: Kaynak kodu indir
        uses: actions/checkout@v4

      - name: MinGW + SDL2 + OpenGL kur
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-SDL2

      - name: Statik derle - OpenGL 3D (.exe)
        shell: msys2 {0}
        run: |
          gcc -O2 -Wall src/main.c \
            $(sdl2-config --cflags) \
            -o roblox_game.exe \
            -lmingw32 -lSDL2main \
            -Wl,-Bstatic -lSDL2 \
            -Wl,-Bdynamic \
            -lopengl32 -lglu32 \
            -lm -mwindows \
            -limm32 -lole32 -loleaut32 -lversion -lwinmm -lsetupapi -lgdi32 -luser32
          echo "=== OpenGL 3D derleme tamamlandi! ==="
          ls -lh roblox_game.exe

      - name: EXE'yi paketle (tek dosya, DLL yok)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Name "roblox_oyun_windows" -Force
          Copy-Item "roblox_game.exe" "roblox_oyun_windows/"
          if (Test-Path "README.txt") {
            Copy-Item "README.txt" "roblox_oyun_windows/"
          }
          Compress-Archive -Path "roblox_oyun_windows" -DestinationPath "roblox_oyun_windows.zip"
          Write-Host "Hazir! Tek EXE - DLL gerekmez, OpenGL sisteme entegre!"

      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: roblox-oyun-windows
          path: roblox_oyun_windows.zip
          retention-days: 30

  build-linux:
    name: Linux binary derle
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak kodu indir
        uses: actions/checkout@v4

      - name: Bagimliliklar
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev libgl1-mesa-dev libglu1-mesa-dev

      - name: Derle
        run: |
          gcc -O2 -Wall src/main.c \
            $(sdl2-config --cflags --libs) \
            -lGL -lGLU -lm \
            -o roblox_game
          ls -lh roblox_game

      - name: Artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: roblox-oyun-linux
          path: roblox_game
          retention-days: 30
