name: Windows EXE Derle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows .exe Derle
    runs-on: windows-latest

    steps:
      - name: Kaynak kodu indir
        uses: actions/checkout@v4

      - name: MinGW + SDL2 kur (pacman ile)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-SDL2

      - name: Derle (.exe)
        shell: msys2 {0}
        run: |
          gcc -O2 -Wall src/main.c \
            $(sdl2-config --cflags --libs) \
            -lm -mwindows \
            -o roblox_game.exe
          echo "=== Derleme tamamlandi! ==="
          ls -lh roblox_game.exe

      - name: SDL2.dll bul ve kopyala
        shell: msys2 {0}
        run: |
          SDL2_DLL=$(find /mingw64/bin -name "SDL2.dll" | head -1)
          echo "SDL2.dll yolu: $SDL2_DLL"
          cp "$SDL2_DLL" .

      - name: EXE ve DLL'i paketle
        shell: powershell
        run: |
          New-Item -ItemType Directory -Name "roblox_oyun_windows" -Force
          Copy-Item "roblox_game.exe" "roblox_oyun_windows/"
          Copy-Item "SDL2.dll" "roblox_oyun_windows/"
          if (Test-Path "README.txt") {
            Copy-Item "README.txt" "roblox_oyun_windows/"
          }
          Compress-Archive -Path "roblox_oyun_windows" -DestinationPath "roblox_oyun_windows.zip"
          Write-Host "Paket hazirlandi!"

      - name: Artifact olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: roblox-oyun-windows
          path: roblox_oyun_windows.zip
          retention-days: 30

  build-linux:
    name: Linux binary derle
    runs-on: ubuntu-latest

    steps:
      - name: Kaynak kodu indir
        uses: actions/checkout@v4

      - name: SDL2 kur
        run: sudo apt-get update && sudo apt-get install -y libsdl2-dev

      - name: Derle
        run: |
          gcc -O2 -Wall src/main.c \
            $(sdl2-config --cflags --libs) \
            -lm \
            -o roblox_game
          echo "Derleme tamam!"
          ls -lh roblox_game

      - name: Artifact olarak yukle
        uses: actions/upload-artifact@v4
        with:
          name: roblox-oyun-linux
          path: roblox_game
          retention-days: 30
